name: Backfill draw history

# One-time / on-demand backfill of a game's full draw archive. The incremental
# "Update lottery data" workflow keeps histories current after each draw; run
# this manually to fill a game's history the first time, or to repair gaps.

on:
  workflow_dispatch:
    inputs:
      game:
        description: "Which game to backfill"
        type: choice
        options:
          - powerball
          - mega_millions
          - lotto_america
          - ny_lotto
          - ny_take5
          - ny_pick10
          - all
        default: powerball
      limit:
        description: "Max draws to fetch this run (0 = no cap)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Backfill
        run: |
          if [ "${{ inputs.game }}" = "all" ]; then
            for g in lotto_america powerball mega_millions ny_lotto ny_take5 ny_pick10; do
              python scraper/history_scraper.py --game "$g" --limit ${{ inputs.limit }}
            done
          else
            python scraper/history_scraper.py --game "${{ inputs.game }}" --limit ${{ inputs.limit }}
          fi

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Backfill ${{ inputs.game }} history [skip ci]"
          # Resilient to concurrent pushes: rebase onto latest main, retry.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed; retrying in 5s..."
            sleep 5
          done
          echo "push failed after 5 attempts"
          exit 1
