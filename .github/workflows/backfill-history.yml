name: Backfill draw history

# One-time / on-demand backfill of a game's full draw archive. The incremental
# "Update lottery data" workflow keeps histories current after each draw; run
# this manually to fill a game's history the first time, or to repair gaps.

on:
  workflow_dispatch:
    inputs:
      game:
        description: "Which game to backfill"
        type: choice
        options:
          - powerball
          - mega_millions
          - lotto_america
          - all
        default: powerball
      limit:
        description: "Max draws to fetch this run (0 = no cap)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Backfill
        run: |
          if [ "${{ inputs.game }}" = "all" ]; then
            for g in lotto_america powerball mega_millions; do
              python scraper/history_scraper.py --game "$g" --limit ${{ inputs.limit }}
            done
          else
            python scraper/history_scraper.py --game "${{ inputs.game }}" --limit ${{ inputs.limit }}
          fi

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Backfill ${{ inputs.game }} history [skip ci]"
            git push
          fi
