name: Update lottery data

on:
  schedule:
    # Times are UTC. ET draws happen late evening -> next morning UTC.
    - cron: '30 4 * * 3,6'   # Mega Millions: Tue/Fri 11pm ET -> Wed/Sat 04:30 UTC
    - cron: '30 4 * * 2,4,0' # Powerball + Lotto America: Mon/Wed/Sat -> Tue/Thu/Sun 04:30 UTC
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Append latest draws to history
        run: |
          python scraper/history_scraper.py --game lotto_america
          python scraper/history_scraper.py --game powerball
          python scraper/history_scraper.py --game mega_millions
          python scraper/history_scraper.py --game ny_lotto
          python scraper/history_scraper.py --game ny_take5
          python scraper/history_scraper.py --game ny_pick10
          python scraper/history_scraper.py --game ny_win4
          python scraper/history_scraper.py --game ny_numbers
          python scraper/history_scraper.py --game ny_m4l
          python scraper/history_scraper.py --game ny_cash4life
          python scraper/history_scraper.py --game ny_quickdraw
          python scraper/history_scraper.py --game tx_lotto
          python scraper/history_scraper.py --game tx_twostep
          python scraper/history_scraper.py --game tx_cashfive
          python scraper/history_scraper.py --game tx_pick3
          python scraper/history_scraper.py --game tx_daily4
          python scraper/history_scraper.py --game tx_allornothing
          python scraper/history_scraper.py --game ca_superlotto
          python scraper/history_scraper.py --game ca_fantasy5
          python scraper/history_scraper.py --game ca_daily4
          python scraper/history_scraper.py --game ca_daily3
          python scraper/history_scraper.py --game ca_derby
          python scraper/history_scraper.py --game id_cash
          python scraper/history_scraper.py --game id_pick3
          python scraper/history_scraper.py --game id_pick4
          python scraper/history_scraper.py --game pa_pick3
          python scraper/history_scraper.py --game pa_pick4
          python scraper/history_scraper.py --game pa_pick5
          python scraper/history_scraper.py --game fl_lotto
          python scraper/history_scraper.py --game fl_triple
          python scraper/history_scraper.py --game fl_fantasy5
          python scraper/history_scraper.py --game fl_pick2
          python scraper/history_scraper.py --game fl_pick3
          python scraper/history_scraper.py --game fl_pick4
          python scraper/history_scraper.py --game fl_pick5
          python scraper/history_scraper.py --game fl_cashpop

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update lottery data [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed; retrying in 5s..."
            sleep 5
          done
          echo "push failed after 5 attempts"
          exit 1
