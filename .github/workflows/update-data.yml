name: Update lottery data

on:
  schedule:
    # Times are UTC. ET draws happen late evening -> next morning UTC.
    - cron: '30 4 * * 3,6'   # Mega Millions: Tue/Fri 11pm ET -> Wed/Sat 04:30 UTC
    - cron: '30 4 * * 2,4,0' # Powerball + Lotto America: Mon/Wed/Sat -> Tue/Thu/Sun 04:30 UTC
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Append latest Lotto America draw to history
        run: python scraper/history_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history/lotto_america.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update lottery data [skip ci]"
            git push
          fi
