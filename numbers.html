<body>
  <header class="detail-header">
    <a class="back-link" id="back" href="index.html">&larr; Back</a>
    <h1 id="nums-title">Hot &amp; cold numbers</h1>
    <p class="tagline" id="nums-sub"></p>
  </header>

  <main id="nums" class="detail">
    <div class="stat-strip" id="summary"></div>

    <div class="detail-grid">
      <section class="panel">
        <h2>Hottest numbers</h2>
        <p class="section-note">Drawn most often.</p>
        <div class="freq-list" id="hot"></div>
      </section>
      <section class="panel">
        <h2>Most overdue</h2>
        <p class="section-note">Longest since last drawn.</p>
        <div class="freq-list" id="overdue"></div>
      </section>
    </div>

    <section class="panel">
      <h2>White ball frequency</h2>
      <p class="section-note" id="white-note"></p>
      <div class="freq-chart"><canvas id="white-chart"></canvas></div>
    </section>

    <section class="panel">
      <h2 id="special-h2">Special ball frequency</h2>
      <div class="freq-chart freq-chart--sm"><canvas id="special-chart"></canvas></div>
    </section>

    <p class="disclaimer" id="caveat"></p>
  </main>

  <footer class="site-footer">
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </nav>
    <p>Frequency is historical, not predictive — lottery draws are independent.</p>
  </footer>

  <script src="numbers.js"></script>
