<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1281838483505325"
     crossorigin="anonymous"></script>
  <script src="analytics.js"></script>
  <script defer src="nav.js"></script>
  <script defer src="schema.js"></script>
  <title>Odds visualizer — NumbersIntel</title>
  <meta name="description" id="meta-desc" content="See lottery odds as a field of dots — one red win among millions. From NumbersIntel." />
  <link rel="canonical" id="meta-canonical" href="https://numbersintel.com/visualizer.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="NumbersIntel" />
  <meta property="og:image" content="https://numbersintel.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:image" content="https://numbersintel.com/og-image.png" />
  <meta property="og:title" id="og-title" content="NumbersIntel" />
  <meta property="og:description" id="og-desc" content="See lottery odds as a field of dots — one red win among millions." />
  <meta property="og:url" id="og-url" content="https://numbersintel.com/visualizer.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="tw-title" content="NumbersIntel" />
  <meta name="twitter:description" id="tw-desc" content="See lottery odds as a field of dots — one red win among millions." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="detail-header">
    <a class="back-link" id="back" href="index.html">&larr; Back</a>
    <h1 id="viz-title">Odds visualizer</h1>
    <p class="tagline" id="viz-sub"></p>
  </header>

  <main class="viz">
    <p class="calc-notice">
      <span class="calc-notice__icon" aria-hidden="true">&#9888;</span>
      <span><strong>For illustration only — not financial or gambling advice.</strong> The odds shown are the
      published game rules, drawn to scale to show how unlikely each prize is. The lottery is a
      negative-expected-value bet; play for entertainment only.</span>
    </p>

    <section class="panel viz-controls">
      <label>
        Prize
        <select id="tier"></select>
      </label>
      <label>
        Lines purchased
        <input type="number" id="lines" min="1" value="1" inputmode="numeric" />
      </label>
      <div class="viz-stats" id="stats"></div>
      <button id="locate" class="btn" type="button">Find the winning dot</button>
    </section>

    <div class="dot-legend">
      <span class="key"><span class="swatch swatch--red"></span> Your winning chance</span>
      <span class="key"><span class="swatch swatch--white"></span> A losing outcome</span>
      <span class="key" id="scroll-hint"></span>
    </div>

    <div id="dotarea" class="dot-area" aria-label="A field of dots; one red dot is your chance to win"></div>
  </main>

  <script src="common.js"></script>
  <script src="visualizer.js"></script>
</body>
</html>
